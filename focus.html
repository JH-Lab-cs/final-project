<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Quest | 집중</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/storage.js" defer></script>
  <script src="js/common.js" defer></script>
  <script src="js/focus.js" defer></script>
</head>
<body data-page="focus">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Campus Quest 홈">
        <span class="brand-mark">CQ</span>
        <span class="brand-text">Campus Quest</span>
      </a>
      <button class="nav-toggle" id="navToggle" type="button" aria-controls="siteNav" aria-expanded="false">메뉴</button>
      <nav class="site-nav" id="siteNav" aria-label="주요 메뉴">
        <a href="index.html" data-page="home">홈</a>
        <a href="tasks.html" data-page="tasks">과제</a>
        <a href="focus.html" data-page="focus">집중</a>
        <a href="guide.html" data-page="guide">가이드</a>
        <button class="theme-toggle" id="themeToggle" type="button">다크</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">집중 타이머</p>
        <h1>집중 시간을 기록하고 XP 성장에 반영하세요.</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="stats-grid compact-stats">
          <article class="stat-card">
            <span class="stat-label">오늘 집중</span>
            <strong id="todayFocus">0분</strong>
            <small>오늘 기록된 집중 시간</small>
          </article>
          <article class="stat-card">
            <span class="stat-label">누적 집중</span>
            <strong id="totalFocus">0분</strong>
            <small>저장된 집중 시간</small>
          </article>
          <article class="stat-card">
            <span class="stat-label">세션 수</span>
            <strong id="sessionCount">0</strong>
            <small>저장된 집중 기록</small>
          </article>
          <article class="stat-card">
            <span class="stat-label">집중 XP</span>
            <strong id="focusXpValue">0 XP</strong>
            <small>25분마다 10 XP</small>
          </article>
        </div>
      </div>
    </section>

    <section class="section section-tight">
      <div class="container split-grid">
        <article class="timer-panel">
          <p class="eyebrow">현재 세션</p>
          <div class="timer-display" id="timerDisplay" aria-live="polite">00:00:00</div>
          <div class="timer-controls">
            <button class="btn btn-primary" id="startTimer" type="button">시작</button>
            <button class="btn btn-secondary" id="pauseTimer" type="button">일시정지</button>
            <button class="btn btn-secondary" id="resetTimer" type="button">초기화</button>
            <button class="btn btn-secondary" id="prepareDemoSession" type="button">1분 기록 준비</button>
          </div>
          <p class="timer-hint">세션 저장은 60초 이상부터 가능하며, 집중 XP는 누적 25분마다 증가합니다. 1분 기록 준비는 저장 조건 확인용입니다.</p>
          <div class="form-group">
            <label for="sessionNote">세션 메모</label>
            <input id="sessionNote" type="text" maxlength="80">
          </div>
          <div class="inline-message" id="focusMessage" role="status" aria-live="polite"></div>
          <button class="btn btn-primary full-width" id="saveSession" type="button">세션 저장</button>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">기록</p>
              <h2>집중 기록</h2>
            </div>
            <button class="btn btn-danger btn-small" id="clearSessions" type="button">전체 삭제</button>
          </div>
          <div class="record-list" id="sessionList"></div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">Campus Quest - HTML/CSS/JavaScript 웹 프로젝트</div>
  </footer>
</body>
</html>
